
{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Lista de Productos</h2>
    <a href="{{ url_for('create_form') }}" class="btn btn-success">➕ Nuevo Producto</a>
</div>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio (€)</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.nombre }}</td>
            <td>{{ p.categoria }}</td>
            <td>{{ p.precio }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <a href="{{ url_for('edit_form', id=p.id) }}" class="btn btn-sm btn-warning">✏️ Editar</a>
                <form action="{{ url_for('delete_product', id=p.id) }}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar {{ p.nombre }}?')">🗑️ Eliminar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
